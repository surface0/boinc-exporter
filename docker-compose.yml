services:
  boinc-exporter:
    build: .
    ports:
      - "9101:9101"
    environment:
      # Set BOINC_HOST to "host.docker.internal" (macOS/Windows) or your host IP (Linux)
      BOINC_HOST: "${BOINC_HOST:-host.docker.internal}"
      BOINC_PORT: "${BOINC_PORT:-31416}"
      BOINC_PASSWORD: "${BOINC_PASSWORD:-}"
      EXPORTER_PORT: "9101"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  victoriametrics:
    image: victoriametrics/victoria-metrics:latest
    ports:
      - "8428:8428"
    volumes:
      - vm_data:/storage
      - ./victoriametrics/scrape.yml:/etc/victoriametrics/scrape.yml:ro
    command:
      - "-storageDataPath=/storage"
      - "-promscrape.config=/etc/victoriametrics/scrape.yml"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GF_ADMIN_PASSWORD:-admin}"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    restart: unless-stopped

volumes:
  vm_data:
  grafana_data:
